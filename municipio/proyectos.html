<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Mis proyectos · Municipio</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/naowee-tech/naowee-design-system@v1.8.0/dist/design-system.css">
<link rel="stylesheet" href="../shared/shell.css">
<link rel="stylesheet" href="../shared/wizard-page.css">
<link rel="stylesheet" href="../shared/pages.css?v=20260514a">
</head>
<body>
<div class="shell">
  <div id="sidebarRoot"></div>
  <div class="main">
    <header class="top-header" id="topHeader"></header>
    <div class="page" id="pageContent"></div>
  </div>
</div>
<div id="demoRoleSwitcherRoot"></div>

<script type="module">
  import ProjectData from '../shared/data.js';
  import { mountShell } from '../shared/shell.js?v=20260513o';
  import { ESTADOS_POSTULACION, formatoMoneda, fechaCorta, diasRestantes } from '../shared/states.js';
  import { openPostularModal } from '../shared/modal-postular.js?v=20260513o';
  ProjectData.setPerfil('municipio');
  mountShell({ activeId: 'mis-proyectos' });

  /* Filtrar por municipios cubiertos por la entidad del perfil (multi-municipio) */
  const perfilMun = ProjectData.getPerfilData('municipio');
  const municipiosCubiertos = perfilMun?.municipiosCubiertos || [perfilMun?.municipio].filter(Boolean);
  const misProyectos = ProjectData.getProyectos(p => municipiosCubiertos.includes(p.municipio));
  const counts = misProyectos.reduce((acc, p) => { acc[p.estado] = (acc[p.estado] || 0) + 1; return acc; }, {});

  const ICONS = {
    back: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>',
    plus: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M12 5v14M5 12h14"/></svg>',
    search: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>',
    check: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
    chev: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>',
    close: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>',
    flag: '<svg viewBox="0 0 16 16" fill="currentColor"><path d="M3 1.5a.5.5 0 0 1 .5-.5h9.7a.5.5 0 0 1 .42.78L11.5 5l2.12 3.22a.5.5 0 0 1-.42.78H4v6.5a.5.5 0 0 1-1 0z"/></svg>'
  };

  const estadosUnicos = Object.keys(counts).filter(e => ESTADOS_POSTULACION[e]);
  const FILTER_LABELS = { estado: 'Estado' };
  const STATE_LABELS = { todos: 'Todos', ...Object.fromEntries(estadosUnicos.map(e => [e, ESTADOS_POSTULACION[e].label])) };

  document.getElementById('pageContent').innerHTML = `
    <div class="page-fade-in">
      <a class="naowee-btn naowee-btn--mute naowee-btn--small back-btn" href="dashboard.html" style="margin-bottom:14px">${ICONS.back}Volver al panel</a>
      <div class="naowee-page-header naowee-page-header--centered">
        <div class="naowee-page-header__main">
          <h1>Mis proyectos</h1>
          <p>Postulaciones y proyectos en curso de tu municipio.</p>
        </div>
        <div class="naowee-page-header__actions">
          <!-- "Postular proyecto" removido 13/05/2026 (Juanma): solo se postula desde
               la card de cada convocatoria abierta. -->
          <a class="naowee-btn naowee-btn--mute naowee-btn--large" href="convocatorias.html">${ICONS.plus} Ver convocatorias abiertas</a>
        </div>
      </div>

      <div class="naowee-table-card">
        <div class="naowee-table-card__toolbar">
          <div class="naowee-table-card__toolbar-left">
            <div class="naowee-searchbox naowee-searchbox--medium" id="searchbox" style="width:340px">
              <div class="naowee-searchbox__input-wrap">
                <span class="naowee-searchbox__icon">${ICONS.search}</span>
                <input type="text" class="naowee-searchbox__input" id="searchInput" placeholder="Buscar radicado o proyecto">
                <button type="button" class="naowee-searchbox__clear" id="searchClear" aria-label="Limpiar búsqueda">${ICONS.close}</button>
              </div>
            </div>
            <div class="naowee-filter-dropdown" data-filter="estado">
              <button class="naowee-filter-dropdown__trigger" type="button">
                <span data-dd-label>Estado</span>
                <span class="naowee-filter-dropdown__chev">${ICONS.chev}</span>
              </button>
              <div class="naowee-filter-dropdown__menu">
                <button type="button" class="naowee-filter-dropdown__option" data-value="todos" aria-selected="true">
                  <span class="ff-checkbox">${ICONS.check}</span>
                  <span class="ff-dot" data-color="neutral"></span>
                  <span class="ff-label">Todos</span>
                  <span class="ff-count">${misProyectos.length}</span>
                </button>
                ${estadosUnicos.map(e => {
                  const def = ESTADOS_POSTULACION[e];
                  return `<button type="button" class="naowee-filter-dropdown__option" data-value="${e}" aria-selected="false">
                    <span class="ff-checkbox">${ICONS.check}</span>
                    <span class="ff-dot" data-color="${def.color}"></span>
                    <span class="ff-label">${def.label}</span>
                    <span class="ff-count">${counts[e]||0}</span>
                  </button>`;
                }).join('')}
              </div>
            </div>
            <button type="button" class="naowee-btn naowee-btn--link naowee-btn--small" id="filterClear" disabled>Limpiar filtros <span id="filterClearCount"></span></button>
          </div>
        </div>
        <div class="naowee-table-card__active-tags" id="filterTags" style="display:none"></div>
        <div class="naowee-table-card__table-wrap">
          <table class="naowee-table--in-card" id="projTable">
            <thead>
              <tr>
                <th>Radicado</th>
                <th>Proyecto</th>
                <th class="numeric">Presupuesto</th>
                <th class="numeric">Fecha</th>
                <th>Estado</th>
                <th>Plazo</th>
              </tr>
            </thead>
            <tbody id="tbody">
              ${misProyectos.map(p => {
                const est = ESTADOS_POSTULACION[p.estado] || { label: p.estado, color: 'neutral' };
                /* SLA contextual según estado — usa el plazo Res. 933 (15 días hábiles) */
                let dias = null;
                let slaLabel = '';
                if (p.estado === 'devuelta_subsanacion') {
                  dias = diasRestantes(p.fechaDevolucion);
                  slaLabel = 'para subsanar';
                } else if (p.estado === 'presentado' || p.estado === 'en_revision') {
                  dias = diasRestantes(p.fechaInicioRevision || p.fechaPostulacion);
                  slaLabel = 'respuesta Ministerio';
                } else if (p.estado === 'etapa_documental') {
                  dias = diasRestantes(p.fechaInicioRevision || p.fechaPostulacion, 20);
                  slaLabel = 'revisión documental';
                }
                const slaClass = dias === null ? ''
                  : dias <= 0 ? 'sla-chip--vencido'
                  : dias <= 3 ? 'sla-chip--urgent'
                  : dias <= 7 ? 'sla-chip--warning'
                  : 'sla-chip--ok';
                return `
                  <tr data-estado="${p.estado}" data-search="${(p.radicado+' '+p.nombre).toLowerCase()}" onclick="fadeAndGo('proyecto-perfil.html?id=${p.idUnico}')">
                    <td class="naowee-table__cell-muted" style="font-weight:500;font-size:12px;letter-spacing:.2px;white-space:nowrap;color:var(--text-secondary)">
                      <span class="rad-cell" title="${p.radicado || ''}">
                        ${p.priorizado
                          ? `<span class="prio-flag" title="Priorizado">${ICONS.flag}</span>`
                          : `<span class="prio-flag prio-flag--empty" aria-hidden="true"></span>`}
                        ${(p.radicado || '—').split('-CONV-')[0]}
                      </span>
                    </td>
                    <td class="naowee-table__cell-name proj-name-cell">
                      <div class="proj-name-cell__title" title="${p.nombre}">${p.nombre}</div>
                      <div class="naowee-table__cell-muted" style="font-weight:400;font-size:11.5px;margin-top:2px">${p.tipoSolicitud||''}</div>
                    </td>
                    <td class="numeric" style="font-weight:600;white-space:nowrap">${formatoMoneda(p.presupuesto)}</td>
                    <td class="numeric" style="color:var(--text-secondary);font-weight:500;font-size:12px;white-space:nowrap">${fechaCorta(p.fechaPostulacion)}</td>
                    <td>
                      <span class="naowee-badge naowee-badge--${est.color} naowee-badge--quiet">${est.label}</span>
                    </td>
                    <td class="naowee-table__cell-muted" style="font-size:12.5px;white-space:nowrap">
                      ${dias !== null ? `
                        <div style="display:flex;flex-direction:column;gap:2px">
                          <span style="font-weight:700;color:${dias <= 0 ? '#b42318' : dias <= 3 ? 'var(--accent)' : dias <= 7 ? '#b45309' : 'var(--text-primary)'};font-variant-numeric:tabular-nums">
                            ${dias <= 0 ? 'Vencido' : `${dias} día${dias===1?'':'s'}`}
                          </span>
                          <span style="font-size:10.5px;color:var(--text-secondary);font-weight:500">${slaLabel}</span>
                        </div>
                      ` : '<span style="color:var(--text-secondary);font-style:italic;font-size:12px">—</span>'}
                    </td>
                  </tr>`;
              }).join('')}
            </tbody>
          </table>
          <div class="table-empty-state" id="emptyState" hidden>
            <div class="table-empty-state__icon">
              <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
            </div>
            <div class="table-empty-state__title">Sin resultados</div>
            <div class="table-empty-state__msg">No encontramos proyectos que coincidan con los filtros aplicados.</div>
            <button type="button" class="naowee-btn naowee-btn--mute naowee-btn--small table-empty-state__btn" id="emptyClearBtn">Limpiar filtros</button>
          </div>
        </div>
      </div>
    </div>
  `;

  /* ───── Filtros + búsqueda con tags ───── */
  const activeFilters = {};
  let searchTerm = '';
  const searchBoxEl = document.getElementById('searchbox');
  const searchInputEl = document.getElementById('searchInput');

  function applyFilters() {
    let visible = 0;
    document.querySelectorAll('#tbody tr').forEach(tr => {
      const matchEstado = !activeFilters.estado || activeFilters.estado === 'todos' || tr.dataset.estado === activeFilters.estado;
      const matchSearch = !searchTerm || tr.dataset.search.includes(searchTerm);
      const show = matchEstado && matchSearch;
      tr.style.display = show ? '' : 'none';
      if (show) visible++;
    });
    const hasFilters = Object.keys(activeFilters).length > 0 || !!searchTerm;
    const emptyEl = document.getElementById('emptyState');
    const tbodyEl = document.getElementById('tbody');
    if (visible === 0 && hasFilters) {
      emptyEl.hidden = false;
      tbodyEl.style.visibility = 'hidden';
    } else {
      emptyEl.hidden = true;
      tbodyEl.style.visibility = '';
    }
    renderTags();
  }

  function renderTags() {
    const tags = document.getElementById('filterTags');
    const clear = document.getElementById('filterClear');
    const clearCount = document.getElementById('filterClearCount');
    const entries = Object.entries(activeFilters).filter(([, v]) => v && v !== 'todos');
    tags.innerHTML = entries.map(([key, val]) => `
      <span class="naowee-tag naowee-tag--small naowee-tag--accent">
        ${FILTER_LABELS[key]}: ${STATE_LABELS[val] || val}
        <span class="naowee-tag__active-area" role="button" tabindex="0" data-remove="${key}">
          <span class="naowee-tag__close">${ICONS.close}</span>
        </span>
      </span>
    `).join('');
    tags.style.display = entries.length ? 'flex' : 'none';
    clear.disabled = entries.length === 0 && !searchTerm;
    clearCount.textContent = entries.length ? ` (${entries.length})` : '';
    document.querySelectorAll('.naowee-filter-dropdown[data-filter]').forEach(dd => {
      const key = dd.dataset.filter;
      const lbl = dd.querySelector('[data-dd-label]');
      const val = activeFilters[key];
      lbl.textContent = (val && val !== 'todos') ? (STATE_LABELS[val] || val) : FILTER_LABELS[key];
    });
    tags.querySelectorAll('[data-remove]').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const k = btn.dataset.remove;
        delete activeFilters[k];
        document.querySelectorAll(`.naowee-filter-dropdown[data-filter="${k}"] .naowee-filter-dropdown__option`).forEach(o => o.setAttribute('aria-selected', String(o.dataset.value === 'todos')));
        applyFilters();
      });
    });
  }

  document.querySelectorAll('.naowee-filter-dropdown[data-filter]').forEach(dd => {
    const trig = dd.querySelector('.naowee-filter-dropdown__trigger');
    trig.addEventListener('click', e => {
      e.stopPropagation();
      const wasOpen = dd.classList.contains('is-open');
      document.querySelectorAll('.naowee-filter-dropdown.is-open').forEach(d => d.classList.remove('is-open'));
      if (!wasOpen) dd.classList.add('is-open');
    });
    dd.querySelectorAll('.naowee-filter-dropdown__option').forEach(opt => {
      opt.addEventListener('click', e => {
        e.stopPropagation();
        const key = dd.dataset.filter;
        const val = opt.dataset.value;
        dd.querySelectorAll('.naowee-filter-dropdown__option').forEach(o => o.setAttribute('aria-selected', String(o === opt)));
        if (val === 'todos') delete activeFilters[key];
        else activeFilters[key] = val;
        dd.classList.remove('is-open');
        applyFilters();
      });
    });
  });
  document.addEventListener('click', () => {
    document.querySelectorAll('.naowee-filter-dropdown.is-open').forEach(d => d.classList.remove('is-open'));
  });

  searchInputEl.addEventListener('input', e => {
    searchTerm = e.target.value.trim().toLowerCase();
    searchBoxEl.classList.toggle('naowee-searchbox--has-value', !!searchInputEl.value);
    applyFilters();
  });
  document.getElementById('searchClear').addEventListener('click', () => {
    searchInputEl.value = '';
    searchTerm = '';
    searchBoxEl.classList.remove('naowee-searchbox--has-value');
    applyFilters();
  });

  function clearAllFilters() {
    Object.keys(activeFilters).forEach(k => delete activeFilters[k]);
    searchTerm = '';
    searchInputEl.value = '';
    searchBoxEl.classList.remove('naowee-searchbox--has-value');
    document.querySelectorAll('.naowee-filter-dropdown__option').forEach(o => o.setAttribute('aria-selected', String(o.dataset.value === 'todos')));
    applyFilters();
  }
  document.getElementById('filterClear').addEventListener('click', clearAllFilters);
  document.getElementById('emptyClearBtn').addEventListener('click', clearAllFilters);

  /* Botón "Postular" → modal canónico (no página dedicada) */
  document.getElementById('btnPostular')?.addEventListener('click', () => {
    openPostularModal({
      onPostulado: () => window.location.reload()
    });
  });

  applyFilters();
</script>
</body>
</html>
