<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Subsanar postulación · Municipio</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/naowee-tech/naowee-design-system@v1.8.0/dist/design-system.css">
<link rel="stylesheet" href="../shared/shell.css">
<link rel="stylesheet" href="../shared/pages.css?v=20260513b">
<link rel="stylesheet" href="../shared/wizard-page.css">
<style>
  /* Card por área técnica devuelta — agrupa todas sus observaciones */
  .subs-area {
    border: 1.5px solid var(--border-dark, #d0d4e6);
    border-radius: 14px;
    margin-bottom: 18px;
    background: #fff;
    overflow: hidden;
    transition: border-color .2s, box-shadow .2s;
  }
  .subs-area.is-complete {
    border-color: var(--green, #15803d);
    box-shadow: 0 0 0 3px rgba(21, 128, 61, .08);
  }
  .subs-area.is-partial {
    border-color: var(--accent, #d74009);
  }
  .subs-area__head {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 18px;
    background: linear-gradient(90deg, var(--orange-bg, #fff3e6) 0%, #fff8ef 100%);
    border-bottom: 1px solid var(--orange-border, #ffbf75);
  }
  .subs-area.is-complete .subs-area__head {
    background: linear-gradient(90deg, var(--green-bg, #e6f4e7) 0%, #f1f9f2 100%);
    border-bottom-color: var(--green-border, #b7dfb9);
  }
  .subs-area__icon {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--accent, #d74009); color: #fff;
    display: inline-flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .subs-area.is-complete .subs-area__icon {
    background: var(--green, #15803d);
  }
  .subs-area__icon svg { width: 18px; height: 18px; }
  .subs-area__title {
    flex: 1;
    font-size: 14.5px; font-weight: 700; color: var(--text-primary);
  }
  .subs-area__count {
    font-size: 11.5px; color: var(--text-secondary);
    font-weight: 500;
    margin-top: 2px;
  }
  .subs-area__status {
    font-size: 11px; font-weight: 700;
    letter-spacing: .4px; text-transform: uppercase;
    padding: 4px 10px; border-radius: 999px;
    white-space: nowrap;
  }
  .subs-area__status--pendiente {
    background: var(--orange-bg); color: var(--accent);
    border: 1px solid var(--orange-border);
  }
  .subs-area__status--parcial {
    background: #fff3e6; color: var(--accent);
    border: 1px solid var(--orange-border);
  }
  .subs-area__status--completa {
    background: var(--green, #15803d); color: #fff;
    border: 1px solid var(--green, #15803d);
  }
  .subs-area__body { padding: 16px 18px 4px; }
  .subs-area__progress {
    height: 4px; background: var(--grey-bg, #f5f6fa);
    border-radius: 999px; overflow: hidden;
    margin: 0 18px 12px;
  }
  .subs-area__progress > span {
    display: block; height: 100%;
    background: var(--green, #15803d);
    transition: width .4s cubic-bezier(.4, 0, .2, 1);
  }

  /* Observación individual dentro de un área */
  .subs-obs {
    border-left: 3px solid var(--accent, #d74009);
    padding-left: 14px;
    margin-bottom: 18px;
  }
  .subs-obs__head {
    display: flex; justify-content: space-between; gap: 10px;
    margin-bottom: 6px;
  }
  .subs-obs__chip {
    font-size: 10.5px; font-weight: 700; letter-spacing: .3px;
    color: var(--accent, #d74009);
    text-transform: uppercase;
  }
  .subs-obs__ref {
    font-size: 10.5px; color: var(--text-secondary);
  }
  .subs-obs__body {
    font-size: 13.5px; line-height: 1.5;
    color: var(--text-primary);
    margin: 0 0 10px;
    font-weight: 500;
  }

  /* Resumen sticky superior con contador global */
  .subs-summary {
    position: sticky; top: 0; z-index: 5;
    background: rgba(255,255,255,.96); backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border);
    padding: 14px 0;
    margin-bottom: 18px;
    display: flex; justify-content: space-between; align-items: center;
    gap: 16px; flex-wrap: wrap;
  }
  .subs-summary__stats {
    display: flex; gap: 22px;
  }
  .subs-summary__stat-label {
    font-size: 10.5px; font-weight: 700; letter-spacing: .4px;
    text-transform: uppercase; color: var(--text-secondary);
  }
  .subs-summary__stat-value {
    font-size: 20px; font-weight: 800; color: var(--text-primary);
    font-variant-numeric: tabular-nums;
  }
</style>
</head>
<body>
<div class="shell">
  <div id="sidebarRoot"></div>
  <div class="main">
    <header class="top-header" id="topHeader"></header>
    <div class="page" id="pageContent"></div>
  </div>
</div>
<div id="demoRoleSwitcherRoot"></div>

<script type="module">
  import ProjectData from '../shared/data.js';
  import { mountShell } from '../shared/shell.js?v=20260513a';
  import { formatoFecha, diasRestantes } from '../shared/states.js';
  import { toast } from '../shared/toast.js';
  import {
    renderStepper, renderFooter, mountWizard,
    fileDrop, mountFileDrops,
    renderReview, renderSuccess,
    textarea
  } from '../shared/wizard-page.js';

  ProjectData.setPerfil('municipio');
  mountShell({ activeId: 'mis-proyectos' });

  const id = new URLSearchParams(location.search).get('id');
  const p = ProjectData.getProyecto(id);
  const pageContent = document.getElementById('pageContent');

  if (!p) {
    pageContent.innerHTML = `
      <div class="naowee-empty-state">
        <div class="naowee-empty-state__title">Proyecto no encontrado</div>
        <a class="naowee-btn naowee-btn--quiet" href="dashboard.html">Volver</a>
      </div>`;
  } else {
    const observaciones = p.observaciones || [];

    /* ═══ Agrupar observaciones por área técnica (Res. 933 Art. 9) ═══
       Permite subsanación multi-área en paralelo. Cada área se trata como
       un grupo independiente con su propio estado. */
    const obsPorArea = {};
    observaciones.forEach((o, idx) => {
      const area = o.area || 'general';
      if (!obsPorArea[area]) obsPorArea[area] = [];
      obsPorArea[area].push({ ...o, idx });
    });
    const areas = Object.keys(obsPorArea);
    const isMultiArea = areas.length > 1;

    /* Estado de cada área (persistido en proyecto.subsanacionAreas) */
    const subsAreas = p.subsanacionAreas || {};

    /* Días restantes para subsanar (15 días desde devolución) */
    const dias = diasRestantes(p.fechaDevolucion);
    const slaCls = dias === null ? '' : dias <= 0 ? 'sla-chip--vencido' : dias <= 3 ? 'sla-chip--urgent' : dias <= 7 ? 'sla-chip--warning' : 'sla-chip--ok';

    /* Map nombres de áreas técnicas → ícono */
    const areaIcons = {
      topografico:    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 20l6-16 6 9 6-5v12z"/></svg>',
      suelos:         '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 18h16M4 14h16M4 10h16M4 6h16"/></svg>',
      arquitectonico: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="9" width="18" height="12"/><path d="M3 9l9-6 9 6"/></svg>',
      estructural:    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18M5 21V8l7-5 7 5v13M9 21v-8h6v8"/></svg>',
      hidrosanitario: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 6h6M5 12c0-3 3-6 7-6s7 3 7 6c0 4-3 8-7 8s-7-4-7-8z"/></svg>',
      electrico:      '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M13 2L4.5 14h6L9 22l8.5-12h-6L13 2z"/></svg>',
      ambiental:      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 8C8 10 5 16 6 22m11-14c0-3-1-4-3-6-1 1-2 2-2 4 0 1 1 2 1 3-1 1-2 2-3 2-2 0-3-1-3-3 0-1 1-2 2-2"/></svg>',
      presupuesto:    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>',
      general:        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 8v5M12 16h.01"/></svg>'
    };
    const areaNombres = {
      topografico: 'Levantamiento topográfico',
      suelos: 'Estudio de suelos',
      arquitectonico: 'Diseño arquitectónico',
      estructural: 'Diseño estructural',
      hidrosanitario: 'Diseño hidrosanitario',
      electrico: 'Diseño eléctrico',
      ambiental: 'Manejo, riesgos y ambiental',
      presupuesto: 'Presupuesto integral',
      general: 'Observaciones generales'
    };

    /* Smart back */
    const ref = document.referrer;
    const backHref = ref.includes('proyecto-perfil.html') ? `proyecto-perfil.html?id=${p.idUnico}`
      : ref.includes('proyectos.html') ? 'proyectos.html'
      : 'dashboard.html';
    const backLabel = backHref.includes('proyecto-perfil') ? 'Volver al proyecto'
      : backHref === 'proyectos.html' ? 'Volver a mis proyectos'
      : 'Volver al panel';

    const STEPS = [
      { label: 'Responder por área' },
      { label: 'Revisar y enviar' }
    ];

    pageContent.innerHTML = `
      <div class="page-fade-in wz-page">
        <div class="wz-page__header">
          <a class="naowee-btn naowee-btn--mute naowee-btn--small back-btn" href="${backHref}"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>${backLabel}</a>
          <h1 class="wz-page__title">Subsanar postulación</h1>
          <p class="wz-page__subtitle">
            ${p.nombre} · ${observaciones.length} observación${observaciones.length === 1 ? '' : 'es'}
            ${isMultiArea ? `en ${areas.length} áreas técnicas` : ''}
          </p>
        </div>

        <form id="formSubs" class="wz-card" novalidate>
          <div class="wz-stepper-wrap">
            ${renderStepper(STEPS)}
          </div>

          <div class="wz-body" data-wz-body>
            <!-- PASO 1: Responder agrupado por área -->
            <div class="wz-step-panel is-active" data-panel="1">
              ${observaciones.length === 0 ? `
                <div class="naowee-message naowee-message--positive" role="status" style="margin-bottom:0">
                  <div class="naowee-message__header">
                    <span class="naowee-message__icon"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3.5 8.5l3 3 6-6" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
                    <span class="naowee-message__title">Sin observaciones pendientes</span>
                  </div>
                  <div class="naowee-message__text">Esta postulación no tiene observaciones registradas para subsanar.</div>
                </div>
              ` : `
                <!-- Resumen sticky con stats globales -->
                <div class="subs-summary">
                  <div class="subs-summary__stats">
                    <div>
                      <div class="subs-summary__stat-label">${isMultiArea ? 'Áreas devueltas' : 'Observaciones'}</div>
                      <div class="subs-summary__stat-value">${isMultiArea ? areas.length : observaciones.length}</div>
                    </div>
                    <div>
                      <div class="subs-summary__stat-label">Subsanadas</div>
                      <div class="subs-summary__stat-value" id="statsSubsanadas">0</div>
                    </div>
                    <div>
                      <div class="subs-summary__stat-label">Pendientes</div>
                      <div class="subs-summary__stat-value" id="statsPendientes">${observaciones.length}</div>
                    </div>
                  </div>
                  ${dias !== null ? `
                    <span class="sla-chip ${slaCls}" title="Plazo legal Res. 933">
                      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 14"/></svg>
                      ${dias <= 0 ? 'Vencido' : `${dias} día${dias===1?'':'s'} para subsanar`}
                    </span>
                  ` : ''}
                </div>

                <p style="font-size:13px;color:var(--text-secondary);margin:0 0 16px">
                  ${isMultiArea
                    ? 'Las observaciones están agrupadas por área técnica. Responde cada área de manera independiente — cada una se marca como subsanada cuando completes todas sus observaciones.'
                    : 'Responde cada observación con texto y, si aplica, adjunta el documento corregido.'}
                </p>

                ${areas.map(areaKey => {
                  const areaObs = obsPorArea[areaKey];
                  const ya = subsAreas[areaKey];
                  return `
                    <div class="subs-area" data-area="${areaKey}">
                      <div class="subs-area__head">
                        <span class="subs-area__icon">${areaIcons[areaKey] || areaIcons.general}</span>
                        <div style="flex:1">
                          <div class="subs-area__title">${areaNombres[areaKey] || areaKey}</div>
                          <div class="subs-area__count">${areaObs.length} observación${areaObs.length === 1 ? '' : 'es'} a subsanar</div>
                        </div>
                        <span class="subs-area__status subs-area__status--pendiente" data-status>Pendiente</span>
                      </div>
                      <div class="subs-area__progress"><span data-progress style="width:0%"></span></div>
                      <div class="subs-area__body">
                        ${areaObs.map(o => `
                          <div class="subs-obs">
                            <div class="subs-obs__head">
                              <span class="subs-obs__chip">${o.tipo || 'Observación'}</span>
                              <span class="subs-obs__ref">${o.ref ? `Ref. ${o.ref} · ` : ''}${formatoFecha(o.ts)}</span>
                            </div>
                            <p class="subs-obs__body">${o.detalle || ''}</p>
                            ${textarea({ label: 'Tu respuesta', name: `respuesta_${o.idx}`, required: true, placeholder: 'Describe cómo se subsanó esta observación…', maxlength: 1000, rows: 3 })}
                            ${fileDrop({ name: `soporte_${o.idx}`, title: 'Adjuntar documento de soporte', hint: 'PDF, JPG o PNG · opcional', accept: '.pdf,.jpg,.jpeg,.png' })}
                          </div>
                        `).join('')}
                      </div>
                    </div>
                  `;
                }).join('')}
              `}
            </div>

            <!-- PASO 2: Revisar -->
            <div class="wz-step-panel" data-panel="2">
              <p style="font-size:13.5px;color:var(--text-secondary);margin:0 0 18px">Confirma las respuestas antes de enviar la subsanación a revisión.</p>
              <div id="reviewBox"></div>
            </div>
          </div>

          ${renderFooter({
            cancelHref: `proyecto-perfil.html?id=${p.idUnico}`,
            saveDraft: false,
            publishLabel: 'Enviar subsanación'
          })}
        </form>
      </div>
    `;

    const form = document.getElementById('formSubs');
    mountFileDrops(form);

    if (observaciones.length === 0) {
      form.querySelector('[data-wz-next]').style.display = 'none';
    }

    /* ═══ Estado por-área: progreso + chip dinámico ═══
       Cuenta cuántas observaciones tienen respuesta dentro de un área,
       actualiza progress bar + chip + estilo del card.
       Stats globales del summary se recalculan. */
    function updateAreaStatus() {
      let totalSubsanadas = 0;
      let totalObs = observaciones.length;
      areas.forEach(areaKey => {
        const areaObs = obsPorArea[areaKey];
        const card = form.querySelector(`.subs-area[data-area="${areaKey}"]`);
        if (!card) return;
        const respondidas = areaObs.filter(o => {
          const ta = form.querySelector(`textarea[name="respuesta_${o.idx}"]`);
          return ta && ta.value.trim().length >= 10;
        }).length;
        const pct = areaObs.length ? (respondidas / areaObs.length) * 100 : 0;
        card.querySelector('[data-progress]').style.width = pct + '%';
        const chip = card.querySelector('[data-status]');
        card.classList.toggle('is-complete', pct === 100);
        card.classList.toggle('is-partial', pct > 0 && pct < 100);
        if (pct === 100) {
          chip.className = 'subs-area__status subs-area__status--completa';
          chip.innerHTML = '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" style="margin-right:4px;vertical-align:-1px"><polyline points="20 6 9 17 4 12"/></svg>Lista para reenviar';
          totalSubsanadas += areaObs.length;
        } else if (pct > 0) {
          chip.className = 'subs-area__status subs-area__status--parcial';
          chip.textContent = `${respondidas}/${areaObs.length} parcial`;
          totalSubsanadas += respondidas;
        } else {
          chip.className = 'subs-area__status subs-area__status--pendiente';
          chip.textContent = 'Pendiente';
        }
      });
      const statsSub = document.getElementById('statsSubsanadas');
      const statsPen = document.getElementById('statsPendientes');
      if (statsSub) statsSub.textContent = totalSubsanadas;
      if (statsPen) statsPen.textContent = totalObs - totalSubsanadas;
    }
    form.addEventListener('input', updateAreaStatus);
    updateAreaStatus();

    /* ═══ Review agrupado por área ═══ */
    function buildReview() {
      const fd = new FormData(form);
      const groups = areas.map(areaKey => {
        const areaObs = obsPorArea[areaKey];
        const rows = [];
        areaObs.forEach((o, i) => {
          const resp = fd.get(`respuesta_${o.idx}`) || '';
          const sop = fd.get(`soporte_${o.idx}`);
          rows.push([
            `${i + 1}. ${(o.detalle || '—').slice(0, 100)}${(o.detalle || '').length > 100 ? '…' : ''}`,
            `<div style="font-size:13px;color:var(--text-primary)">${resp.slice(0, 300) || '<span style=\"color:var(--text-secondary);font-style:italic\">Sin respuesta</span>'}</div>
             ${sop?.name ? `<div style="margin-top:4px;font-size:11px;color:var(--accent)">📎 ${sop.name}</div>` : ''}`
          ]);
        });
        return { title: `${areaNombres[areaKey] || areaKey} · ${areaObs.length} obs.`, rows };
      });
      document.getElementById('reviewBox').innerHTML = renderReview(groups);
    }

    /* ═══ Envío con persistencia por-área ═══
       - Si TODAS las áreas tienen respuesta completa → proyecto a `en_revision`
       - Si solo algunas → proyecto sigue en `devuelta_subsanacion` pero
         se guarda el progreso parcial por área. */
    mountWizard({
      scope: form,
      totalSteps: STEPS.length,
      validateStep: (panel, step) => {
        if (step === 1) setTimeout(buildReview, 50);
        return true;
      },
      onPublish: () => {
        const fd = new FormData(form);
        const ahora = new Date().toISOString();
        const areasEnviadas = [];
        const areasParciales = [];

        areas.forEach(areaKey => {
          const areaObs = obsPorArea[areaKey];
          const respondidas = areaObs.filter(o => {
            const r = fd.get(`respuesta_${o.idx}`) || '';
            return r.trim().length >= 10;
          });
          if (respondidas.length === areaObs.length) {
            areasEnviadas.push({ key: areaKey, nombre: areaNombres[areaKey], count: respondidas.length });
          } else if (respondidas.length > 0) {
            areasParciales.push({ key: areaKey, nombre: areaNombres[areaKey], respondidas: respondidas.length, total: areaObs.length });
          }
        });

        if (areasEnviadas.length === 0) {
          toast({ variant: 'negative', title: 'Sin áreas completas', message: 'Debes completar todas las observaciones de al menos un área para enviar.' });
          return;
        }

        const todasCompletas = areasParciales.length === 0;
        ProjectData.setProyecto(p.idUnico, x => {
          /* Guardar el progreso por-área */
          x.subsanacionAreas = x.subsanacionAreas || {};
          areasEnviadas.forEach(a => {
            x.subsanacionAreas[a.key] = { ts: ahora, estado: 'enviada', respuestas: a.count };
          });
          areasParciales.forEach(a => {
            x.subsanacionAreas[a.key] = { ts: ahora, estado: 'parcial', respondidas: a.respondidas, total: a.total };
          });
          /* Si todas las áreas están completas → volver a revisión */
          if (todasCompletas) {
            x.estado = 'en_revision';
            x.fechaInicioRevision = ahora;
          }
          x.historial = x.historial || [];
          x.historial.push({
            ts: ahora, actor: 'municipio',
            evento: todasCompletas
              ? `Subsanación completa enviada · ${areasEnviadas.length} área(s)`
              : `Subsanación parcial · ${areasEnviadas.length} de ${areas.length} áreas completas`,
            estado: x.estado
          });
          return x;
        });

        ProjectData.pushNotificacion({
          perfil: 'revisor',
          tipo: 'subsanacion',
          titulo: todasCompletas ? 'Postulación re-enviada a revisión' : 'Subsanación parcial recibida',
          detalle: `${p.idUnico} · ${areasEnviadas.length} área${areasEnviadas.length === 1 ? '' : 's'} subsanada${areasEnviadas.length === 1 ? '' : 's'}`
        });

        /* Toast inmediato: feedback antes del success screen (refuerzo redundante
           para que se vea sin scroll en viewports cortos). */
        toast({
          variant: 'positive',
          title: todasCompletas ? 'Subsanación completa enviada' : 'Progreso guardado',
          message: todasCompletas
            ? `Postulación volvió a estado "En revisión". El revisor fue notificado.`
            : `${areasEnviadas.length} de ${areas.length} áreas completas. Puedes volver a finalizar las pendientes.`
        });

        renderSuccess(form, {
          title: todasCompletas ? '¡Subsanación enviada!' : 'Subsanación parcial guardada',
          message: todasCompletas
            ? `Tu postulación volvió a revisión. El revisor recibió ${areasEnviadas.length} área${areasEnviadas.length === 1 ? '' : 's'} corregida${areasEnviadas.length === 1 ? '' : 's'} y emitirá el concepto en los próximos días.`
            : `Guardamos ${areasEnviadas.length} de ${areas.length} áreas. Las restantes (${areasParciales.map(a => a.nombre).join(', ')}) siguen pendientes — puedes volver y completarlas antes del vencimiento.`,
          stamp: `${areasEnviadas.length} área${areasEnviadas.length === 1 ? '' : 's'} completa${areasEnviadas.length === 1 ? '' : 's'}`,
          ctaLabel: 'Volver al proyecto',
          onContinue: () => { window.location.href = `proyecto-perfil.html?id=${p.idUnico}`; }
        });
      }
    });
  }
</script>
</body>
</html>
