<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Detalle convocatoria · Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/naowee-tech/naowee-design-system@v1.8.0/dist/design-system.css">
<link rel="stylesheet" href="../shared/shell.css">
<link rel="stylesheet" href="../shared/pages.css?v=20260513i">
</head>
<body>
<div class="shell">
  <div id="sidebarRoot"></div>
  <div class="main">
    <header class="top-header" id="topHeader"></header>
    <div class="page" id="pageContent"></div>
  </div>
</div>
<div id="demoRoleSwitcherRoot"></div>

<script type="module">
  import ProjectData from '../shared/data.js';
  import { mountShell } from '../shared/shell.js?v=20260513e';
  import { ESTADOS_POSTULACION, formatoMoneda, formatoFecha, fechaCorta } from '../shared/states.js';
  ProjectData.setPerfil('admin');
  mountShell({ activeId: 'convocatorias' });

  const params = new URLSearchParams(location.search);
  const id = params.get('id');
  const isNueva = params.get('nueva') === '1';
  const c = ProjectData.getConvocatorias().find(x => x.id === id);

  if (!c) {
    document.getElementById('pageContent').innerHTML = `<div class="naowee-empty-state"><div class="naowee-empty-state__title">Convocatoria no encontrada</div><a class="naowee-btn naowee-btn--quiet" href="convocatorias.html">Volver</a></div>`;
  } else {
    const proyectos = ProjectData.getProyectos(p => p.convocatoriaId === c.id);
    const totalPresupuesto = proyectos.reduce((s, p) => s + (p.presupuesto || 0), 0);

    /* Cálculo de progreso del período de postulación.
       Edge cases manejados:
       - Vencida (today > cierre): progreso = 100% (rojo, "Cerró")
       - Cierra hoy (diasRestantes === 0): progreso = 100% (rojo)
       - Datos inválidos (cierre < apertura o iguales): progreso = 100% (rojo) */
    const aperturaD = new Date(c.apertura);
    const cierreD = new Date(c.cierre);
    const today = new Date();
    const validDates = !isNaN(aperturaD) && !isNaN(cierreD);
    const cierreVencido = validDates && today > cierreD;
    const totalDias = validDates ? Math.max(0, Math.round((cierreD - aperturaD) / 86400000)) : 0;
    const elapsed = validDates ? Math.max(0, Math.round((today - aperturaD) / 86400000)) : 0;
    const diasRestantes = validDates ? Math.max(0, Math.round((cierreD - today) / 86400000)) : 0;
    let progreso;
    if (!validDates || cierreVencido) progreso = 100;
    else if (totalDias === 0) progreso = 100; /* mismo día apertura=cierre o cierre<=apertura */
    else progreso = Math.min(100, Math.max(0, Math.round((elapsed / totalDias) * 100)));

    document.getElementById('pageContent').innerHTML = `
      <div class="page-fade-in">
        <a class="naowee-btn naowee-btn--mute naowee-btn--small back-btn" href="convocatorias.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>Volver a convocatorias</a>

        <div class="convo-header">
          <h1 class="convo-header__title">
            ${c.nombre}
            <span class="naowee-badge naowee-badge--${c.estado === 'abierta' ? 'positive' : 'neutral'} naowee-badge--quiet convo-header__badge"><span class="naowee-badge__dot"></span>${c.estado === 'abierta' ? 'Abierta' : 'Cerrada'}</span>
          </h1>
          <div class="convo-desc" data-collapsed="true">
            <p class="convo-desc__text">${c.descripcion}</p>
            <button type="button" class="convo-desc__toggle" hidden>
              <span class="convo-desc__toggle-text">Ver más</span>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
            </button>
          </div>
        </div>

        ${isNueva ? `
          <div class="naowee-message naowee-message--positive" role="status">
            <div class="naowee-message__header">
              <span class="naowee-message__icon"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3.5 8.5l3 3 6-6" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
              <span class="naowee-message__title">Convocatoria publicada</span>
            </div>
            <div class="naowee-message__text">Los municipios fueron notificados. Las postulaciones aparecerán acá apenas se reciban.</div>
          </div>
        ` : ''}

        <!-- KPIs: 2 pequeñas a la izquierda + período rectangular a la derecha -->
        ${(() => {
          /* Semáforo basado en % de progreso del período:
             - <50%: positive (verde — sobra tiempo)
             - 50-75%: caution (amber — la mitad, atención)
             - 75-90%: caution (naranja accent — urgente)
             - >90%: negative (rojo — crítico, días por acabarse) */
          let semVariant, semClass, semLabel;
          if (c.estado !== 'abierta') { semVariant = 'neutral'; semClass = 'sem-gray'; semLabel = 'Cerrada'; }
          else if (cierreVencido)    { semVariant = 'negative'; semClass = 'sem-red';   semLabel = 'Cierre vencido'; }
          else if (diasRestantes === 0) { semVariant = 'negative'; semClass = 'sem-red'; semLabel = 'Cierra hoy'; }
          else if (progreso >= 90)   { semVariant = 'negative'; semClass = 'sem-red';   semLabel = `${diasRestantes} día${diasRestantes===1?'':'s'} restantes`; }
          else if (progreso >= 75)   { semVariant = 'caution';  semClass = 'sem-amber'; semLabel = `${diasRestantes} días restantes`; }
          else if (progreso >= 50)   { semVariant = 'caution';  semClass = 'sem-amber'; semLabel = `${diasRestantes} días restantes`; }
          else                       { semVariant = 'positive'; semClass = 'sem-green'; semLabel = `${diasRestantes} días restantes`; }
          return `
        <div class="convo-stats">
          <div class="convo-stats__col">
            <!-- Bienio -->
            <div class="convo-stat">
              <div class="convo-stat__icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
              </div>
              <div>
                <div class="convo-stat__lbl">Bienio</div>
                <div class="convo-stat__val convo-stat__val--sm">${(c.bienio || '').replace('-', ' · ')}</div>
              </div>
            </div>
            <!-- Postulaciones -->
            <div class="convo-stat">
              <div class="convo-stat__icon convo-stat__icon--accent">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="13" y2="17"/></svg>
              </div>
              <div>
                <div class="convo-stat__lbl">Postulaciones</div>
                <div class="convo-stat__val">${proyectos.length}</div>
                <div class="convo-stat__delta">${formatoMoneda(totalPresupuesto)} en propuestas</div>
              </div>
            </div>
          </div>

          <!-- Período: apertura → cierre con barra semáforo -->
          <div class="convo-stat convo-stat--periodo ${semClass}">
            <div class="convo-periodo__head">
              <span class="convo-stat__lbl">Período de postulación</span>
              <span class="naowee-badge naowee-badge--${semVariant} naowee-badge--quiet">${semLabel}</span>
            </div>
            <div class="convo-periodo__bar">
              <span class="convo-periodo__fill" style="width:${progreso}%"></span>
            </div>
            <div class="convo-periodo__labels">
              <div>
                <div class="convo-periodo__lbl">Apertura</div>
                <div class="convo-periodo__date">${fechaCorta(c.apertura)}</div>
              </div>
              <div>
                <div class="convo-periodo__lbl">Cierre</div>
                <div class="convo-periodo__date">${fechaCorta(c.cierre)}</div>
              </div>
            </div>
          </div>
        </div>

        <!-- Strip de configuración (antes era tab separado · Juanma min 43:00) -->
        <div class="convo-config-strip">
          <div class="convo-config-strip__item">
            <span class="convo-config-strip__lbl">Presupuesto total</span>
            <span class="convo-config-strip__val" style="color:var(--green)">${formatoMoneda(c.presupuestoTotal)}</span>
          </div>
          <div class="convo-config-strip__sep"></div>
          <div class="convo-config-strip__item">
            <span class="convo-config-strip__lbl">Tope por proyecto</span>
            <span class="convo-config-strip__val">${formatoMoneda(c.montoMaximoProyecto)}</span>
          </div>
          <div class="convo-config-strip__sep"></div>
          <div class="convo-config-strip__item">
            <span class="convo-config-strip__lbl">Fuentes de cofinanciación</span>
            <span class="convo-config-strip__val convo-config-strip__val--chips">
              ${(c.fuentes || []).slice(0,2).map(f => `<span class="naowee-badge naowee-badge--informative naowee-badge--quiet">${f}</span>`).join('')}
              ${(c.fuentes || []).length > 2 ? `<span class="convo-config-strip__more" title="${(c.fuentes || []).slice(2).join(' · ')}">+${(c.fuentes || []).length - 2}</span>` : ''}
              ${(c.fuentes || []).length === 0 ? '<span style="color:var(--text-secondary)">—</span>' : ''}
            </span>
          </div>
          <div class="convo-config-strip__sep"></div>
          <div class="convo-config-strip__item">
            <span class="convo-config-strip__lbl">Emisión de conceptos</span>
            <span class="convo-config-strip__val">${formatoFecha(c.emisionConcepto)}</span>
          </div>
          <div class="convo-config-strip__sep"></div>
          <div class="convo-config-strip__item">
            <span class="convo-config-strip__lbl">2da convocatoria</span>
            <span class="convo-config-strip__val">${c.permiteSegunda ? '<span style="color:var(--green);font-weight:700">Sí</span>' : 'No'}</span>
          </div>
        </div>`;
        })()}

        ${(() => {
          const n = c.notificacion;
          if (!n) {
            return `
              <div class="notif-card notif-card--pending">
                <div class="notif-card__main">
                  <div class="notif-card__icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"/></svg></div>
                  <div class="notif-card__body">
                    <div class="notif-card__title">Sin notificar a municipios</div>
                    <div class="notif-card__sub">La convocatoria está publicada pero no se ha enviado notificación a los municipios destinatarios.</div>
                  </div>
                </div>
                <a class="naowee-btn naowee-btn--loud naowee-btn--small" href="convocatoria-notificar.html?id=${c.id}">Configurar y enviar →</a>
              </div>
            `;
          }
          const cfg = {
            pendiente: { variant: 'caution', label: 'Pendiente de envío', cta: 'Configurar y enviar' },
            programada: { variant: 'informative', label: 'Envío programado', cta: 'Editar y reenviar' },
            enviada: { variant: 'positive', label: 'Notificación enviada', cta: 'Editar y reenviar' },
            con_fallas: { variant: 'caution', label: 'Enviada con fallas', cta: 'Reintentar fallos' }
          }[n.estado] || { variant: 'neutral', label: n.estado, cta: 'Editar' };
          const total = n.destinatarios.municipios.length + (n.destinatarios.adicionales?.length || 0);
          return `
            <div class="notif-card notif-card--${cfg.variant}">
              <div class="notif-card__main">
                <div class="notif-card__icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></div>
                <div class="notif-card__body">
                  <div class="notif-card__title">Notificación a municipios <span class="naowee-badge naowee-badge--${cfg.variant} naowee-badge--quiet" style="margin-left:8px;font-size:10.5px">${cfg.label}</span></div>
                  <div class="notif-card__sub">
                    ${n.envio
                      ? `Enviada el ${formatoFecha(n.envio.ts, true)} · <strong>${n.envio.exitosos}</strong> exitosas${n.envio.conFalla ? ` · <strong style="color:#c01818">${n.envio.conFalla} con falla</strong>` : ''} de ${total} municipios`
                      : `${total} municipios destinatarios · canales: ${[n.canales.correo&&'correo', n.canales.plataforma&&'plataforma', n.canales.sms&&'SMS'].filter(Boolean).join(' + ')}`}
                  </div>
                </div>
              </div>
              <a class="naowee-btn ${cfg.variant === 'caution' ? 'naowee-btn--loud' : 'naowee-btn--quiet'} naowee-btn--small" href="convocatoria-notificar.html?id=${c.id}">${cfg.cta} →</a>
            </div>
          `;
        })()}

        <div class="naowee-card proj-tabs-card">
          <div class="convo-section-head">
            <h3 class="convo-section-head__title">Postulaciones recibidas <span class="convo-section-head__count">${proyectos.length}</span></h3>
          </div>

          <div class="convo-postulaciones-body">
            ${proyectos.length === 0 ? `
              <div class="empty-state-clean">
                <div class="empty-state-clean__icon">
                  <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
                    <polyline points="14 2 14 8 20 8"/>
                    <line x1="9" y1="13" x2="15" y2="13" stroke-dasharray="2 2"/>
                    <line x1="9" y1="17" x2="13" y2="17" stroke-dasharray="2 2"/>
                  </svg>
                </div>
                <div class="empty-state-clean__title">Sin postulaciones aún</div>
                <div class="empty-state-clean__msg">Apenas los municipios envíen sus proyectos, aparecerán aquí.</div>
              </div>
            ` : `
              <table class="naowee-table--in-card">
                <thead>
                  <tr><th>Radicado</th><th>Proyecto</th><th>Municipio</th><th class="numeric">Presupuesto</th><th>Estado</th></tr>
                </thead>
                <tbody>
                  ${proyectos.map(p => {
                    const est = ESTADOS_POSTULACION[p.estado] || { label: p.estado, color: 'gris' };
                    return `
                      <tr onclick="fadeAndGo('proyecto-detalle.html?id=${p.idUnico}')">
                        <td class="naowee-table__cell-muted" style="font-weight:500;font-size:12px;letter-spacing:.2px;white-space:nowrap;color:var(--text-secondary)">${(p.radicado || '—').split('-CONV-')[0]}</td>
                        <td class="naowee-table__cell-name proj-name-cell"><div class="proj-name-cell__title" title="${p.nombre}">${p.nombre}</div></td>
                        <td>${p.municipio}</td>
                        <td class="numeric" style="font-weight:600;white-space:nowrap">${formatoMoneda(p.presupuesto)}</td>
                        <td><span class="naowee-badge naowee-badge--${est.color} naowee-badge--quiet">${est.label}</span></td>
                      </tr>`;
                  }).join('')}
                </tbody>
              </table>
            `}
          </div>
        </div>

        <!-- Cenefa de estado al final del flujo (antes estaba dentro del tab Configuración) -->
        ${c.estado === 'abierta' ? `
          <div class="convo-status-cenefa convo-status-cenefa--abierta">
            <span class="convo-status-cenefa__icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 14"/></svg>
            </span>
            <div class="convo-status-cenefa__body">
              <div class="convo-status-cenefa__title">Convocatoria activa · recibiendo postulaciones</div>
              <p class="convo-status-cenefa__msg">Cierra el <strong>${formatoFecha(c.cierre)}</strong> a las 5:00 p.m. Después de esa fecha no se aceptan nuevas postulaciones y comienza el período de revisión técnica.</p>
            </div>
            <div class="convo-status-cenefa__action">
              <a class="naowee-btn naowee-btn--mute naowee-btn--large" href="convocatoria-notificar.html?id=${c.id}">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"/></svg>
                Reenviar notificaciones
              </a>
            </div>
          </div>
        ` : `
          <div class="convo-status-cenefa convo-status-cenefa--cerrada">
            <span class="convo-status-cenefa__icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="9" y1="16" x2="15" y2="16"/></svg>
            </span>
            <div class="convo-status-cenefa__body">
              <div class="convo-status-cenefa__title">Convocatoria cerrada</div>
              <p class="convo-status-cenefa__msg">El período de postulación finalizó el <strong>${formatoFecha(c.cierre)}</strong>. Los conceptos se emitirán antes del ${formatoFecha(c.emisionConcepto)}.</p>
            </div>
            <div class="convo-status-cenefa__action">
              <a class="naowee-btn naowee-btn--mute naowee-btn--large" href="convocatorias.html">Ver otras convocatorias</a>
            </div>
          </div>
        `}
      </div>
    `;

    /* Descripción colapsable: solo mostrar "Ver más" si el texto excede 2 líneas (vertical overflow). */
    requestAnimationFrame(() => {
      const wrap = document.querySelector('.convo-desc');
      const txt = wrap?.querySelector('.convo-desc__text');
      const tog = wrap?.querySelector('.convo-desc__toggle');
      if (!wrap || !txt || !tog) return;
      if (txt.scrollHeight > txt.clientHeight + 1) {
        tog.hidden = false;
        tog.addEventListener('click', () => {
          const collapsed = wrap.dataset.collapsed === 'true';
          wrap.dataset.collapsed = collapsed ? 'false' : 'true';
          tog.querySelector('.convo-desc__toggle-text').textContent = collapsed ? 'Ver menos' : 'Ver más';
          tog.querySelector('svg').style.transform = collapsed ? 'rotate(180deg)' : '';
        });
      }
    });

    /* Tabs removidos en este redesign (Juanma 13/05/2026): la información
       del antiguo tab "Configuración" se promovió al strip superior y la
       cenefa de estado quedó al pie de la página. */
  }
</script>
</body>
</html>
