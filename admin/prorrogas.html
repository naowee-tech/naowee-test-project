<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Solicitudes de prórroga · Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/naowee-tech/naowee-design-system@v1.8.0/dist/design-system.css">
<link rel="stylesheet" href="../shared/shell.css">
<link rel="stylesheet" href="../shared/pages.css?v=20260514a">
<style>
  /* ─── Tabs locales (mismo patrón que admin/usuarios.html) ─── */
  .prorroga-tabs {
    display: flex; gap: 4px;
    border-bottom: 1.5px solid var(--border);
    margin-bottom: 22px;
  }
  .prorroga-tab {
    appearance: none; background: transparent; border: 0;
    padding: 12px 18px;
    font: inherit; font-size: 13.5px; font-weight: 600;
    color: var(--text-secondary); cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color .15s, border-color .15s;
    display: inline-flex; align-items: center; gap: 8px;
    margin-bottom: -1.5px;
  }
  .prorroga-tab:hover { color: var(--text-primary); }
  .prorroga-tab.is-active {
    color: var(--accent); border-bottom-color: var(--accent);
  }
  .prorroga-tab__count {
    background: var(--orange-bg); color: var(--accent);
    font-size: 10.5px; font-weight: 700;
    padding: 2px 8px; border-radius: 999px;
  }
  .prorroga-panel { display: none; animation: tabFadeIn .25s ease both; }
  .prorroga-panel.is-active { display: block; }
  @keyframes tabFadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Celdas de tabla específicas */
  .pr-cell-proyecto { min-width: 220px; }
  .pr-cell-proyecto__title {
    font-size: 13px; font-weight: 600; color: var(--text-primary);
  }
  .pr-cell-proyecto__id {
    font-size: 11px; color: var(--text-secondary);
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    margin-top: 2px;
  }
  .pr-cell-motivo {
    max-width: 360px;
    font-size: 12.5px; color: var(--text-primary);
    line-height: 1.45;
  }
  .pr-cell-motivo__truncated {
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .pr-cell-comentario {
    max-width: 280px;
    font-size: 12px; color: var(--text-secondary);
    font-style: italic;
    line-height: 1.45;
  }
  .pr-cell-fecha {
    font-size: 12px; color: var(--text-secondary);
    white-space: nowrap;
  }
  .pr-cell-acciones {
    display: flex; gap: 6px; justify-content: flex-end;
  }
  .pr-action-btn {
    border: 0; padding: 6px 12px; border-radius: var(--radius-md);
    font: inherit; font-size: 12px; font-weight: 700; cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
  }
  .pr-action-btn--approve { background: var(--green); color: #fff; }
  .pr-action-btn--approve:hover { background: #166f30; }
  .pr-action-btn--reject {
    background: transparent; color: #b42318; border: 1px solid #ffc4bb;
  }
  .pr-action-btn--reject:hover { background: #fff0ee; }

  .pr-empty {
    text-align: center;
    padding: 60px 24px;
    color: var(--text-secondary);
  }
  .pr-empty__title {
    font-size: 14px; font-weight: 700; color: var(--text-primary);
    margin-bottom: 6px;
  }
  .pr-empty__msg { font-size: 13px; }

  /* Modal de confirmación con campo de comentario */
  .pr-resolve-overlay {
    position: fixed; inset: 0; z-index: 1100;
    background: rgba(15, 17, 35, .55);
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
    animation: prFadeIn .22s ease forwards;
  }
  .pr-resolve-overlay.is-closing { animation: prFadeOut .2s ease forwards; }
  @keyframes prFadeIn  { from { opacity: 0 } to { opacity: 1 } }
  @keyframes prFadeOut { from { opacity: 1 } to { opacity: 0 } }
  .pr-resolve-modal {
    background: var(--surface); border-radius: var(--radius-xl);
    width: 100%; max-width: 460px; overflow: hidden;
    box-shadow: 0 24px 60px -12px rgba(15,17,35,.35);
    animation: prSlideIn .26s cubic-bezier(.4,0,.2,1) forwards;
  }
  @keyframes prSlideIn {
    from { opacity: 0; transform: translateY(16px) scale(.97) }
    to   { opacity: 1; transform: translateY(0) scale(1) }
  }
  .pr-resolve-modal__hero { padding: 20px 24px 12px; border-bottom: 1px solid var(--border); }
  .pr-resolve-modal__title { font-size: 16px; font-weight: 700; color: var(--text-primary); }
  .pr-resolve-modal__sub   { font-size: 12.5px; color: var(--text-secondary); margin-top: 4px; line-height: 1.45; }
  .pr-resolve-modal__body  { padding: 16px 24px; }
  .pr-resolve-modal__footer {
    padding: 14px 24px; border-top: 1px solid var(--border);
    display: flex; justify-content: flex-end; gap: 10px;
  }
</style>
</head>
<body>
<div class="shell">
  <div id="sidebarRoot"></div>
  <div class="main">
    <header class="top-header" id="topHeader"></header>
    <div class="page" id="pageContent"></div>
  </div>
</div>
<div id="demoRoleSwitcherRoot"></div>

<script type="module">
  import ProjectData from '../shared/data.js';
  import { mountShell } from '../shared/shell.js?v=20260513o';
  import { toast } from '../shared/toast.js';

  ProjectData.setPerfil('admin');
  mountShell({ activeId: 'prorrogas' });

  const pageContent = document.getElementById('pageContent');

  function fechaCorta(iso) {
    if (!iso) return '—';
    return new Date(iso).toLocaleDateString('es-CO', { day: '2-digit', month: 'short', year: 'numeric' });
  }

  function badgeEstado(estado) {
    const map = {
      pendiente: { v: 'caution',  l: 'Pendiente' },
      aprobada:  { v: 'positive', l: 'Aprobada' },
      rechazada: { v: 'negative', l: 'Rechazada' }
    };
    const s = map[estado] || map.pendiente;
    return `<span class="naowee-badge naowee-badge--${s.v} naowee-badge--quiet">${s.l}</span>`;
  }

  function render() {
    const todas = ProjectData.getProyectos()
      .filter(p => !!p.prorrogaRBI)
      .sort((a, b) => new Date(b.prorrogaRBI.solicitadaEn) - new Date(a.prorrogaRBI.solicitadaEn));

    const pendientes = todas.filter(p => p.prorrogaRBI.estado === 'pendiente');
    const resueltas  = todas.filter(p => p.prorrogaRBI.estado !== 'pendiente');

    pageContent.innerHTML = `
      <div class="page-fade-in">
        <div class="naowee-page-header">
          <div class="naowee-page-header__main">
            <h1>Solicitudes de prórroga</h1>
            <p>El revisor RBI puede pedir 15 días hábiles extra al admin <strong>una sola vez</strong> por proyecto. Aprueba o rechaza cada solicitud para que el cronograma de revisión avance.</p>
          </div>
        </div>

        <div class="naowee-card" style="padding:18px">
          <div class="prorroga-tabs">
            <button type="button" class="prorroga-tab is-active" data-panel="pendientes">
              Pendientes
              <span class="prorroga-tab__count">${pendientes.length}</span>
            </button>
            <button type="button" class="prorroga-tab" data-panel="historial">
              Historial
              <span class="prorroga-tab__count">${resueltas.length}</span>
            </button>
          </div>

          <div class="prorroga-panel is-active" data-panel="pendientes">
            ${pendientes.length === 0 ? `
              <div class="pr-empty">
                <div class="pr-empty__title">Sin solicitudes pendientes</div>
                <div class="pr-empty__msg">Cuando un revisor solicite tiempo extra, aparecerá aquí.</div>
              </div>
            ` : `
              <div class="naowee-table-card__table-wrap">
                <table class="naowee-table--in-card">
                  <thead>
                    <tr>
                      <th>Proyecto</th>
                      <th>Municipio</th>
                      <th>Solicitada</th>
                      <th>Motivo</th>
                      <th style="text-align:right">Acciones</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${pendientes.map(p => renderRowPendiente(p)).join('')}
                  </tbody>
                </table>
              </div>
            `}
          </div>

          <div class="prorroga-panel" data-panel="historial">
            ${resueltas.length === 0 ? `
              <div class="pr-empty">
                <div class="pr-empty__title">Sin historial</div>
                <div class="pr-empty__msg">Las solicitudes resueltas se archivarán aquí.</div>
              </div>
            ` : `
              <div class="naowee-table-card__table-wrap">
                <table class="naowee-table--in-card">
                  <thead>
                    <tr>
                      <th>Proyecto</th>
                      <th>Municipio</th>
                      <th>Estado</th>
                      <th>Resuelta</th>
                      <th>Comentario admin</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${resueltas.map(p => renderRowHistorial(p)).join('')}
                  </tbody>
                </table>
              </div>
            `}
          </div>
        </div>
      </div>
    `;

    bindTabs();
    bindRowActions();
  }

  function renderRowPendiente(p) {
    const pr = p.prorrogaRBI;
    return `
      <tr>
        <td>
          <div class="pr-cell-proyecto">
            <div class="pr-cell-proyecto__title">${p.nombre}</div>
            <div class="pr-cell-proyecto__id">${p.idUnico}</div>
          </div>
        </td>
        <td>
          <div style="font-size:13px;color:var(--text-primary)">${p.municipio}</div>
          <div style="font-size:11.5px;color:var(--text-secondary);margin-top:2px">${p.departamento}</div>
        </td>
        <td><span class="pr-cell-fecha">${fechaCorta(pr.solicitadaEn)}</span></td>
        <td>
          <div class="pr-cell-motivo pr-cell-motivo__truncated" title="${(pr.motivo || '').replace(/"/g, '&quot;')}">${pr.motivo || '<em style="color:var(--text-secondary)">Sin motivo</em>'}</div>
        </td>
        <td>
          <div class="pr-cell-acciones">
            <button type="button" class="pr-action-btn pr-action-btn--approve" data-resolve="${p.idUnico}" data-decision="aprobada">Aprobar</button>
            <button type="button" class="pr-action-btn pr-action-btn--reject" data-resolve="${p.idUnico}" data-decision="rechazada">Rechazar</button>
          </div>
        </td>
      </tr>
    `;
  }

  function renderRowHistorial(p) {
    const pr = p.prorrogaRBI;
    return `
      <tr>
        <td>
          <div class="pr-cell-proyecto">
            <div class="pr-cell-proyecto__title">${p.nombre}</div>
            <div class="pr-cell-proyecto__id">${p.idUnico}</div>
          </div>
        </td>
        <td>
          <div style="font-size:13px;color:var(--text-primary)">${p.municipio}</div>
          <div style="font-size:11.5px;color:var(--text-secondary);margin-top:2px">${p.departamento}</div>
        </td>
        <td>${badgeEstado(pr.estado)}</td>
        <td><span class="pr-cell-fecha">${fechaCorta(pr.resueltaEn)}</span></td>
        <td>
          <div class="pr-cell-comentario" title="${(pr.comentario || '').replace(/"/g, '&quot;')}">${pr.comentario || '<span style="color:var(--text-secondary);font-style:normal">—</span>'}</div>
        </td>
      </tr>
    `;
  }

  function bindTabs() {
    const tabs = document.querySelectorAll('.prorroga-tab');
    const panels = document.querySelectorAll('.prorroga-panel');
    tabs.forEach(t => {
      t.addEventListener('click', () => {
        const key = t.dataset.panel;
        tabs.forEach(x => x.classList.toggle('is-active', x === t));
        panels.forEach(pp => pp.classList.toggle('is-active', pp.dataset.panel === key));
      });
    });
  }

  function bindRowActions() {
    document.querySelectorAll('[data-resolve]').forEach(btn => {
      btn.addEventListener('click', () => openResolveDialog(btn.dataset.resolve, btn.dataset.decision));
    });
  }

  function openResolveDialog(proyectoId, decision) {
    const p = ProjectData.getProyecto(proyectoId);
    if (!p) return;
    const overlay = document.createElement('div');
    overlay.className = 'pr-resolve-overlay';
    overlay.innerHTML = `
      <div class="pr-resolve-modal">
        <div class="pr-resolve-modal__hero">
          <div class="pr-resolve-modal__title">${decision === 'aprobada' ? '¿Aprobar prórroga?' : '¿Rechazar prórroga?'}</div>
          <div class="pr-resolve-modal__sub">${p.nombre} · ${p.idUnico}<br>${decision === 'aprobada' ? 'Concederás 15 días hábiles extra al revisor RBI.' : 'El revisor seguirá con su plazo original de 15 días hábiles.'}</div>
        </div>
        <div class="pr-resolve-modal__body">
          <label class="naowee-textfield naowee-textfield--multiline">
            <span class="naowee-textfield__label">Comentario al revisor ${decision === 'rechazada' ? '<span style="color:#b42318">(recomendado)</span>' : '(opcional)'}</span>
            <div class="naowee-textfield__input-wrap" style="height:auto;padding:12px;align-items:flex-start">
              <textarea id="resolveComment" class="naowee-textfield__input" rows="3" maxlength="300" placeholder="${decision === 'aprobada' ? 'Ej: Aprobada por carga alta del periodo' : 'Ej: La convocatoria está por cerrar, prioriza la revisión'}" style="resize:vertical;min-height:70px"></textarea>
            </div>
          </label>
        </div>
        <div class="pr-resolve-modal__footer">
          <button type="button" class="naowee-btn naowee-btn--mute" data-pr-cancel>Cancelar</button>
          <button type="button" class="naowee-btn ${decision === 'aprobada' ? 'naowee-btn--loud' : 'naowee-btn--quiet'}" id="resolveConfirm" style="${decision === 'rechazada' ? 'background:#b42318 !important;border-color:#b42318 !important;color:#fff !important' : ''}">${decision === 'aprobada' ? 'Aprobar' : 'Rechazar'}</button>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);
    const close = () => {
      overlay.classList.add('is-closing');
      setTimeout(() => overlay.remove(), 200);
    };
    overlay.querySelector('[data-pr-cancel]').addEventListener('click', close);
    overlay.addEventListener('click', e => { if (e.target === overlay) close(); });
    overlay.querySelector('#resolveConfirm').addEventListener('click', () => {
      const comentario = overlay.querySelector('#resolveComment').value.trim();
      const res = ProjectData.resolverProrrogaRBI(proyectoId, decision, comentario);
      if (!res.ok) {
        toast({ variant: 'caution', title: 'No se pudo resolver', message: 'La solicitud ya no está pendiente.' });
        close();
        return;
      }
      ProjectData.pushNotificacion({
        perfil: 'revisor',
        tipo: 'prorroga',
        titulo: decision === 'aprobada' ? 'Prórroga RBI aprobada' : 'Prórroga RBI rechazada',
        detalle: `${proyectoId} · ${decision === 'aprobada' ? `${res.diasExtra} días extra concedidos` : 'Solicitud rechazada'}`
      });
      close();
      render();
      toast({
        variant: decision === 'aprobada' ? 'positive' : 'informative',
        title: decision === 'aprobada' ? 'Prórroga aprobada' : 'Prórroga rechazada',
        message: `Se notificó al revisor de ${proyectoId}.`
      });
    });
  }

  render();
</script>
</body>
</html>
