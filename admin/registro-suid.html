<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Registro SUID de Escenario · Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/naowee-tech/naowee-design-system@v1.8.0/dist/design-system.css">
<link rel="stylesheet" href="../shared/shell.css">
<link rel="stylesheet" href="../shared/pages.css?v=20260512p">
<style>
  /* ═══════════════════════════════════════════════════════════════════
     Registro SUID v2 — replica el flujo escenario-08-dashboard:
     Pre-validación · Datos deportivos · Documentación.

     Toda la lógica en UN solo .naowee-card.suid-card.
     Accordion sections + footer integrado (no sticky).
     ═══════════════════════════════════════════════════════════════════ */
  .suid-card {
    overflow: hidden;
    margin-top: 18px;
  }
  .suid-hero {
    display: flex; align-items: center; gap: 18px;
    padding: 22px 28px;
    background: linear-gradient(135deg, #fff7ee 0%, #fff 60%);
    border-bottom: 1px solid var(--border);
  }
  .suid-hero__icon {
    width: 48px; height: 48px; border-radius: var(--radius-md, 8px);
    background: var(--accent, #d74009); color: #fff;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .suid-hero__icon svg { width: 22px; height: 22px; }
  .suid-hero__body { flex: 1; min-width: 0; }
  .suid-hero__lbl {
    font-size: 10.5px; font-weight: 700; letter-spacing: .5px;
    text-transform: uppercase; color: var(--text-secondary);
  }
  .suid-hero__code {
    font-family: 'SF Mono', Menlo, Consolas, monospace;
    font-size: 20px; font-weight: 700; color: var(--text-primary);
    letter-spacing: 0.4px;
    margin-top: 2px;
  }
  .suid-hero__sub {
    font-size: 12.5px; color: var(--text-secondary);
    margin-top: 4px;
  }
  .suid-hero__status {
    display: flex; flex-direction: column; align-items: flex-end; gap: 6px;
    flex-shrink: 0;
  }
  .suid-hero__art {
    font-size: 10.5px; color: var(--text-secondary);
  }

  /* Phase header — agrupa sections (Pre-validación, Datos deportivos, Documentación) */
  .suid-phase {
    padding: 18px 28px 6px;
    background: #fafbfd;
    border-top: 1px solid var(--border);
  }
  .suid-phase:first-of-type { border-top: 0; }
  .suid-phase__num {
    display: inline-flex; align-items: center; justify-content: center;
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--accent); color: #fff;
    font-size: 11px; font-weight: 700;
    margin-right: 8px;
  }
  .suid-phase__title {
    font-size: 13.5px; font-weight: 800;
    color: var(--text-primary);
    letter-spacing: .3px;
    text-transform: uppercase;
    display: inline-block;
  }
  .suid-phase__hint {
    font-size: 12px; color: var(--text-secondary);
    margin: 4px 0 0 30px;
  }

  /* Accordion sections — plano, sin sombras anidadas */
  .suid-section {
    border-top: 1px solid var(--border);
    background: var(--surface);
  }
  .suid-section__head {
    display: flex; align-items: center; gap: 12px;
    padding: 16px 28px;
    cursor: pointer;
    list-style: none;
    transition: background .12s;
  }
  .suid-section__head::-webkit-details-marker { display: none; }
  .suid-section__head:hover { background: #fafbff; }
  .suid-section__num {
    width: 26px; height: 26px; border-radius: 50%;
    background: var(--accent); color: #fff;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 11.5px; font-weight: 700; flex-shrink: 0;
  }
  .suid-section[data-state="done"] .suid-section__num {
    background: var(--green, #1f8923);
  }
  .suid-section__head-body { flex: 1; min-width: 0; }
  .suid-section__title { font-size: 14px; font-weight: 700; color: var(--text-primary); }
  .suid-section__hint {
    font-size: 12px; color: var(--text-secondary);
    margin-top: 2px;
  }
  .suid-section__chev {
    width: 22px; height: 22px; color: var(--text-secondary);
    transition: transform .25s cubic-bezier(.32,.72,0,1);
    flex-shrink: 0;
  }
  .suid-section[open] .suid-section__chev { transform: rotate(180deg); }
  .suid-section__body {
    padding: 4px 28px 22px;
    border-top: 1px dashed var(--border);
    margin-top: -2px;
  }

  /* Grids */
  .suid-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .suid-grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
  .suid-grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .suid-grid-2 > *, .suid-grid-3 > *, .suid-grid-4 > * { min-width: 0; }
  @media (max-width: 900px) {
    .suid-grid-3, .suid-grid-4 { grid-template-columns: 1fr 1fr; }
  }
  @media (max-width: 600px) {
    .suid-grid-2, .suid-grid-3, .suid-grid-4 { grid-template-columns: 1fr; }
  }

  /* Segmented radio (Sí/No, Recreativa/Alta competencia) */
  .suid-segment {
    display: inline-flex;
    background: var(--surface, #fff);
    border: 1px solid var(--border-dark, #d0d4e6);
    border-radius: var(--radius-md, 8px);
    padding: 3px;
    gap: 2px;
  }
  .suid-segment__opt {
    appearance: none; border: 0; background: transparent;
    padding: 7px 16px;
    font-family: inherit;
    font-size: 13px; font-weight: 600;
    color: var(--text-secondary);
    border-radius: 6px;
    cursor: pointer;
    transition: background .12s, color .12s;
  }
  .suid-segment__opt.is-selected {
    background: var(--accent, #d74009);
    color: #fff;
  }
  .suid-segment__opt:hover:not(.is-selected) {
    color: var(--text-primary);
    background: #fafbff;
  }
  .suid-field-label {
    display: block;
    font-size: 13px; font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 8px;
  }
  .suid-field-label--required::after {
    content: ' *';
    color: #b42318;
  }

  /* Tag chips (multi-toggle) */
  .suid-chip-group {
    display: flex; flex-wrap: wrap; gap: 8px;
  }
  .suid-chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 14px;
    background: #fff;
    border: 1.5px solid var(--border-dark);
    border-radius: 999px;
    font-size: 12.5px; font-weight: 600;
    color: var(--text-secondary);
    cursor: pointer;
    transition: background .12s, border-color .12s, color .12s, transform .12s;
    font-family: inherit;
  }
  .suid-chip:hover {
    border-color: var(--accent);
    color: var(--accent);
    transform: translateY(-1px);
  }
  .suid-chip.is-selected {
    background: var(--orange-bg, #fff3e6);
    border-color: var(--accent);
    color: var(--accent);
  }
  .suid-chip.is-selected::before {
    content: '';
    width: 14px; height: 14px;
    background: var(--accent);
    border-radius: 50%;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'><polyline points='20 6 9 17 4 12'/></svg>");
    background-size: 10px 10px;
    background-repeat: no-repeat;
    background-position: center;
    flex-shrink: 0;
  }
  .suid-hint {
    font-size: 12px; color: var(--text-secondary);
    margin: 10px 0 0;
  }

  /* Photo dropzone slots */
  .suid-photo-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 12px;
  }
  .suid-photo-slot {
    aspect-ratio: 4 / 3;
    border: 1.5px dashed var(--border-dark);
    border-radius: var(--radius-md);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 4px; color: var(--text-secondary);
    cursor: pointer; transition: border-color .15s, background .15s, color .15s;
    background: #fafbff;
    position: relative;
    overflow: hidden;
  }
  .suid-photo-slot:hover {
    border-color: var(--accent); color: var(--accent);
    background: #fff5ec;
  }
  .suid-photo-slot.is-filled {
    border-style: solid;
    border-color: var(--green-border, #b7dfb9);
    background: var(--green-bg, #e6f4e7);
    color: var(--green, #1f8923);
  }
  .suid-photo-slot__icon svg { width: 24px; height: 24px; }
  .suid-photo-slot__label { font-size: 11.5px; font-weight: 600; }
  .suid-photo-slot__check { display: none; }
  .suid-photo-slot.is-filled .suid-photo-slot__icon { display: none; }
  .suid-photo-slot.is-filled .suid-photo-slot__check { display: flex; }
  .suid-photo-hint {
    font-size: 12px; color: var(--text-secondary);
    margin: 12px 0 0;
  }

  /* Range info for lat/lng */
  .suid-coord-hint {
    font-size: 11.5px; color: var(--text-secondary);
    margin-top: 4px;
    display: flex; align-items: center; gap: 4px;
  }
  .suid-coord-hint code {
    background: #fafbfd; padding: 1px 5px;
    border-radius: 3px; font-size: 11px;
    font-family: 'SF Mono', Menlo, monospace;
    color: var(--text-primary);
  }

  /* Validation message — informativo intra-section */
  .suid-validation-message {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 12px 14px;
    border-radius: var(--radius-md, 8px);
    margin-top: 14px;
    font-size: 12.5px;
    line-height: 1.5;
  }
  .suid-validation-message--positive {
    background: var(--green-bg, #e6f4e7);
    border: 1px solid var(--green-border, #b7dfb9);
    color: var(--green, #1f8923);
  }
  .suid-validation-message--informative {
    background: var(--blue-bg, #eef5ff);
    border: 1px solid #bfd9f5;
    color: var(--blue-info, #1f78d1);
  }
  .suid-validation-message__icon { flex-shrink: 0; margin-top: 1px; }

  /* Description textarea — usar el patrón naowee-textfield--multiline manualmente */
  .suid-textarea {
    width: 100%;
    min-height: 100px;
    padding: 12px 14px;
    border: 1px solid #8788ab;
    border-radius: 12px;
    font-family: inherit;
    font-size: 14px;
    color: var(--text-primary);
    background: #fff;
    resize: vertical;
    transition: border-color .15s, box-shadow .15s;
  }
  .suid-textarea:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(215,64,9,.12);
  }

  /* Action footer — integrado, no sticky */
  .suid-actions {
    border-top: 1px solid var(--border);
    background: #fafbfd;
    padding: 18px 28px;
    display: flex; justify-content: space-between; align-items: center;
    gap: 16px; flex-wrap: wrap;
  }
  .suid-actions__hint {
    font-size: 12.5px; color: var(--text-secondary);
    display: flex; align-items: center; gap: 8px;
    flex: 1; min-width: 200px;
  }
  .suid-actions__hint code {
    background: #fff; padding: 2px 6px;
    border-radius: 4px;
    border: 1px solid var(--border);
    font-family: 'SF Mono', Menlo, Consolas, monospace;
    font-size: 11.5px; font-weight: 600;
    color: var(--text-primary);
  }
  .suid-actions__cta {
    display: flex; gap: 10px;
  }
  .suid-actions__cta .naowee-btn--primary-positive {
    background: var(--green, #15803d) !important;
    border-color: var(--green, #15803d) !important;
    color: #fff !important;
    box-shadow: 0 4px 12px rgba(21,128,61,.25) !important;
    transition: box-shadow .15s, transform .12s !important;
  }
  .suid-actions__cta .naowee-btn--primary-positive:hover {
    box-shadow: 0 8px 22px rgba(21,128,61,.35) !important;
    transform: translateY(-1px);
  }

  /* Numbered sub-step list dentro de "Datos deportivos" */
  .suid-substep {
    margin: 8px 0 18px 30px;
    padding-left: 12px;
    border-left: 2px solid var(--border);
    font-size: 12px;
    color: var(--text-secondary);
  }

  @media (max-width: 700px) {
    .suid-hero { flex-direction: column; align-items: flex-start; }
    .suid-hero__status { align-items: flex-start; }
    .suid-actions { flex-direction: column; align-items: stretch; }
    .suid-actions__cta { justify-content: stretch; }
    .suid-actions__cta .naowee-btn { flex: 1; }
  }
</style>
</head>
<body>
<div class="shell">
  <div id="sidebarRoot"></div>
  <div class="main">
    <header class="top-header" id="topHeader"></header>
    <div class="page" id="pageContent"></div>
  </div>
</div>
<div id="demoRoleSwitcherRoot"></div>

<script type="module">
  import ProjectData from '../shared/data.js';
  import { mountShell } from '../shared/shell.js?v=20260513a';
  import { textfield, textarea, dropdown, bindDropdowns } from '../shared/modal-convocatoria.js?v=20260512m';
  import { multiselect, bindMultiselects, validateRequired, bindValidationReset } from '../shared/wizard-page.js?v=20260512m';
  import { bindMasksIn, unmask } from '../shared/masks.js';
  import { toast } from '../shared/toast.js';

  ProjectData.setPerfil('admin');
  mountShell({ activeId: 'inversion' });

  const id = new URLSearchParams(location.search).get('id');
  const p = ProjectData.getProyecto(id);

  if (!p || p.estado !== 'en_inversion') {
    document.getElementById('pageContent').innerHTML = `
      <div class="naowee-empty-state">
        <div class="naowee-empty-state__title">Proyecto no apto para Registro SUID</div>
        <div class="naowee-empty-state__msg">Solo proyectos en estado <strong>En inversión</strong> de tipo Infraestructura pueden registrar escenario.</div>
        <a class="naowee-btn naowee-btn--quiet" href="inversion.html">Volver a tabla de inversión</a>
      </div>`;
  } else {
    const suidCode = p.inversion?.suidEscenario
      || p.registroSuid?.codigo
      || `SUID-${(p.departamento || 'COL').substring(0,3).toUpperCase()}-${(p.municipio || 'XXX').substring(0,3).toUpperCase()}-${String(Date.now()).slice(-3).padStart(3,'0')}`;
    const reg = p.registroSuid || {};
    const yaCompleto = reg.estado === 'completo';

    /* ═══ Catálogos del DS deportivo (Censo Mindeporte / Res. 933 Art.10) ═══ */
    const ZONAS = ['Urbana', 'Rural'];
    const TIPO_INFRA = ['Recreativa', 'Alta competencia'];
    const TIPO_INFRA_GENERAL = [
      'Coliseo', 'Polideportivo', 'Estadio', 'Cancha múltiple',
      'Piscina', 'Pista atlética', 'Gimnasio', 'Centro de Alto Rendimiento'
    ];
    const TIPOS_ESCENARIO = [
      'Coliseo cubierto', 'Coliseo descubierto', 'Polideportivo',
      'Estadio de fútbol', 'Pista atlética', 'Cancha sintética', 'Cancha múltiple',
      'Cancha de béisbol', 'Patinódromo', 'Piscina olímpica',
      'Piscina semi-olímpica', 'Skatepark', 'Velódromo',
      'Centro de alto rendimiento', 'Gimnasio biosaludable', 'Cancha de tenis',
      'Otro'
    ];
    const DISCIPLINAS = [
      'Fútbol', 'Baloncesto', 'Voleibol', 'Atletismo', 'Natación',
      'Boxeo', 'Lucha', 'Ciclismo', 'Patinaje', 'Tenis', 'Béisbol',
      'Softbol', 'Tenis de mesa', 'Bádminton', 'Pesas', 'Judo', 'Karate',
      'Taekwondo', 'Gimnasia', 'Rugby', 'Hockey'
    ];
    const PROGRAMAS_MINDEPORTE = [
      'Supérate-Intercolegiados', 'Hábitos y Estilos de Vida Saludable',
      'Recreación para Adultos Mayores', 'Centros de Iniciación y Formación',
      'Apoyo al Deportista', 'Atención a Personas con Discapacidad'
    ];
    const DOTACION_GENERAL = [
      'Vestuarios', 'Baterías sanitarias', 'Iluminación nocturna', 'Graderías',
      'Cubierta', 'Sistema de sonido', 'Marcador electrónico', 'Cámaras de seguridad',
      'Parqueadero', 'Boletería', 'Cafetería', 'Enfermería'
    ];
    const ESTADO_CONSERVACION = ['Excelente', 'Bueno', 'Regular', 'Deficiente', 'En construcción'];
    const TIPO_ACCESO = ['Público gratuito', 'Público con tarifa', 'Mixto', 'Restringido'];
    const ACCESIBILIDAD = ['Rampa accesible', 'Parqueadero accesible', 'Baterías sanitarias adaptadas', 'Señalización Braille', 'Ascensor'];

    const checkIcon = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
    const chevDown = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>`;
    const imgPlus = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>`;
    const checkBig = `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
    const heroIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>`;
    const infoIcon = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M12 8v4M12 16h.01"/></svg>`;
    const mapIcon = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>`;

    const sectionDone = (cond) => cond ? 'data-state="done"' : '';
    const sectionNum = (cond, n) => cond ? checkIcon : String(n);

    document.getElementById('pageContent').innerHTML = `
      <div class="page-fade-in">
        <a class="naowee-btn naowee-btn--mute naowee-btn--small back-btn" href="inversion.html">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          Volver a tabla de inversión
        </a>

        <div class="naowee-page-header naowee-page-header--centered" style="margin-bottom:8px">
          <div class="naowee-page-header__main">
            <h1>Registro SUID del escenario deportivo</h1>
            <p>Inventariar este escenario en el sistema nacional. Replica el flujo del módulo Escenarios — Resolución 933 Art. 10.</p>
          </div>
        </div>

        <article class="naowee-card suid-card">

          <!-- Hero compacto: código SUID + estado -->
          <div class="suid-hero">
            <div class="suid-hero__icon">${heroIcon}</div>
            <div class="suid-hero__body">
              <div class="suid-hero__lbl">Identificador único nacional</div>
              <div class="suid-hero__code">${suidCode}</div>
              <div class="suid-hero__sub">${p.nombre} · ${p.municipio}, ${p.departamento || ''}</div>
            </div>
            <div class="suid-hero__status">
              <span class="naowee-badge naowee-badge--${yaCompleto ? 'positive' : 'caution'} naowee-badge--quiet">
                <span class="naowee-badge__dot"></span>${yaCompleto ? 'Inventariado' : 'Pendiente'}
              </span>
              <span class="suid-hero__art">Resolución 933 · Art. 10</span>
            </div>
          </div>

          <form id="formSuid">

            <!-- ═══════════ FASE 1: PRE-VALIDACIÓN ═══════════ -->
            <div class="suid-phase">
              <span class="suid-phase__num">1</span>
              <span class="suid-phase__title">Pre-validación</span>
              <p class="suid-phase__hint">Verifica unicidad catastral y ubicación dentro de territorio colombiano.</p>
            </div>

            <!-- 1.1 Datos básicos -->
            <details class="suid-section" data-state="done" open>
              <summary class="suid-section__head">
                <span class="suid-section__num">${checkIcon}</span>
                <div class="suid-section__head-body">
                  <div class="suid-section__title">Datos básicos del escenario</div>
                  <div class="suid-section__hint">Heredado del proyecto · catastral requerido</div>
                </div>
                <span class="suid-section__chev">${chevDown}</span>
              </summary>
              <div class="suid-section__body">
                <div class="suid-grid-3">
                  ${textfield({ label: 'Nombre del escenario', name: 'nombreEscenario', value: p.nombre || '' })}
                  ${textfield({ label: 'Departamento', name: 'departamento', value: p.departamento || '' })}
                  ${textfield({ label: 'Municipio', name: 'municipio', value: p.municipio || '' })}
                </div>
                <div class="suid-grid-2" style="margin-top:16px">
                  ${textfield({ label: 'Número de registro catastral', name: 'catastral', required: true, placeholder: '760010100000-001-000-0001', value: reg.catastral || '', helper: 'Código catastral oficial · 19-22 dígitos' })}
                  ${dropdown({ label: 'Zona', name: 'zona', required: true, options: ZONAS, value: reg.zona || '' })}
                </div>
                <div class="suid-validation-message suid-validation-message--positive" style="margin-top:14px">
                  <span class="suid-validation-message__icon">${checkBig}</span>
                  <div><strong>Catastral único.</strong> No existe otro escenario registrado con este número en el SUID nacional.</div>
                </div>
              </div>
            </details>

            <!-- 1.2 Georreferenciación -->

            <!-- ═══════════ FASE 3: DOCUMENTACIÓN ═══════════ -->
            <div class="suid-phase">

            <!-- 3.1 Información administrativa -->
            <details class="suid-section">
              <summary class="suid-section__head">
                <span class="suid-section__num">9</span>
                <div class="suid-section__head-body">
                  <div class="suid-section__title">Información administrativa</div>
                  <div class="suid-section__hint">Responsable · horarios · presupuesto operativo</div>
                </div>
                <span class="suid-section__chev">${chevDown}</span>
              </summary>
              <div class="suid-section__body">
                <div class="suid-grid-2">
                  ${textfield({ label: 'Responsable administrativo', name: 'responsable', placeholder: 'Nombre completo', value: reg.responsable || p.representante?.nombre || '' })}
                  ${textfield({ label: 'Contacto del escenario', name: 'contacto', placeholder: '+57 311 234 5678', value: reg.contacto || p.representante?.contacto || '' })}
                </div>
                <div class="suid-grid-2" style="margin-top:16px">
                  ${textfield({ label: 'Horario de funcionamiento', name: 'horario', placeholder: 'Lun-Sáb 6 a.m. – 10 p.m.', value: reg.horario || '' })}
                  <div class="naowee-textfield">
                    <label class="naowee-textfield__label">Presupuesto operativo anual (COP)</label>
                    <div class="naowee-textfield__input-wrap">
                      <input class="naowee-textfield__input" name="presupuestoOperativo" type="text" data-mask="money" placeholder="240.000.000" value="${reg.presupuestoOperativo ? Number(reg.presupuestoOperativo).toLocaleString('es-CO') : ''}"/>

            <!-- Footer integrado — no sticky -->
            <div class="suid-actions">
              <div class="suid-actions__hint">
                ${infoIcon}
                Datos asociados al SUID <code>${suidCode}</code> · BPIN <code>${p.inversion?.bpin || '—'}</code>
              </div>
              <div class="suid-actions__cta">
                <button type="button" class="naowee-btn naowee-btn--mute" id="btnSuidDraft">Guardar borrador</button>
                <button type="submit" class="naowee-btn naowee-btn--loud naowee-btn--primary-positive">
                  ${checkIcon} Inventariar escenario
                </button>
              </div>
            </div>
          </form>
        </article>
      </div>
    `;

    const form = document.getElementById('formSuid');

    /* Bind DS components */
    bindDropdowns(form);
    bindMultiselects(form);
    bindValidationReset(form);
    bindMasksIn(form);

    /* ───── Segment toggles (CAR + tipo infra + share toggles) ───── */
    const bindSegment = (containerId, hiddenName) => {
      const container = document.getElementById(containerId);
      const hidden = form.querySelector(`input[name="${hiddenName}"]`);
      container?.querySelectorAll('.suid-segment__opt').forEach(btn => {
        btn.addEventListener('click', () => {
          container.querySelectorAll('.suid-segment__opt').forEach(b => b.classList.remove('is-selected'));
          btn.classList.add('is-selected');
          if (hidden) hidden.value = btn.dataset.val;
        });
      });
    };
    bindSegment('segmentCar', 'esCar');
    bindSegment('segmentTipoInfra', 'tipoInfra');

    /* ───── Chip toggles (disciplinas, dotación, accesibilidad) ───── */
    const bindChips = (containerId, hiddenName, dataAttr) => {
      const container = document.getElementById(containerId);
      const hidden = form.querySelector(`input[name="${hiddenName}"]`);
      container?.querySelectorAll(`[data-${dataAttr}]`).forEach(chip => {
        chip.addEventListener('click', () => {
          chip.classList.toggle('is-selected');
          const sel = Array.from(container.querySelectorAll('.is-selected'))
            .map(c => c.dataset[dataAttr]);
          if (hidden) hidden.value = sel.join(',');
        });
      });
    };
    bindChips('disciplinasChips', 'disciplinas', 'disc');
    bindChips('dotacionChips', 'dotacion', 'dot');
    bindChips('accesibilidadChips', 'accesibilidad', 'acc');

    /* ───── Photo slot toggle (mock — solo marca como llenado) ───── */
    document.querySelectorAll('.suid-photo-slot').forEach(slot => {
      slot.addEventListener('click', () => {
        slot.classList.toggle('is-filled');
      });
    });

    /* ───── "Marcar mi ubicación actual" (mock) ───── */
    document.getElementById('btnUbicarme')?.addEventListener('click', () => {
      const lat = form.querySelector('input[name="lat"]');
      const lng = form.querySelector('input[name="lng"]');
      if (lat) lat.value = p.coordenadas?.lat || '4.7110';
      if (lng) lng.value = p.coordenadas?.lng || '-74.0721';
      toast({ variant: 'informative', title: 'Ubicación capturada', message: 'Coordenadas extraídas del proyecto. Verifica antes de continuar.' });
    });

    /* ───── Validación lat/lng rango Colombia ───── */
    const validarRangoColombia = () => {
      const lat = parseFloat(form.querySelector('input[name="lat"]')?.value);
      const lng = parseFloat(form.querySelector('input[name="lng"]')?.value);
      if (isNaN(lat) || isNaN(lng)) return true;
      const latOk = lat >= -4.23 && lat <= 12.53;
      const lngOk = lng >= -81.73 && lng <= -66.87;
      return latOk && lngOk;
    };

    /* ───── Recolectar todos los datos ───── */
    function recolectar() {
      const fd = new FormData(form);
      return {
        codigo: suidCode,
        /* Pre-validación */
        catastral: fd.get('catastral') || '',
        zona: fd.get('zona') || '',
        lat: parseFloat(fd.get('lat')) || null,
        lng: parseFloat(fd.get('lng')) || null,
        direccion: fd.get('direccion') || '',
        barrio: fd.get('barrio') || '',
        /* Datos deportivos */
        esCar: fd.get('esCar') || 'No',
        tipoInfra: fd.get('tipoInfra') || '',
        tipoInfraGeneral: fd.get('tipoInfraGeneral') || '',
        tipoEscenario: fd.get('tipoEscenario') || '',
        cantidadSubespacios: parseInt(fd.get('cantidadSubespacios')) || 1,
        anioConstruccion: fd.get('anioConstruccion') || '',
        pisos: fd.get('pisos') || '',
        estadoConservacion: fd.get('estadoConservacion') || '',
        areaPredio: unmask(fd.get('areaPredio')) || null,
        areaConstruida: unmask(fd.get('areaConstruida')) || null,
        aforo: unmask(fd.get('aforo')) || null,
        disciplinas: (fd.get('disciplinas') || '').split(',').filter(Boolean),
        dotacion: (fd.get('dotacion') || '').split(',').filter(Boolean),
        tipoAcceso: fd.get('tipoAcceso') || '',
        accesibilidad: (fd.get('accesibilidad') || '').split(',').filter(Boolean),
        descripcion: fd.get('descripcion') || '',
        programasMindeporte: fd.getAll('programasMindeporte') || [],
        poblacionMensual: unmask(fd.get('poblacionMensual')) || null,
        otrosUsos: fd.get('otrosUsos') || '',
        fechaCaptura: fd.get('fechaCaptura') || '',
        responsable: fd.get('responsable') || '',
        contacto: fd.get('contacto') || '',
        horario: fd.get('horario') || '',
        presupuestoOperativo: unmask(fd.get('presupuestoOperativo')) || null
      };
    }

    document.getElementById('btnSuidDraft').addEventListener('click', () => {
      ProjectData.setProyecto(p.idUnico, x => {
        x.registroSuid = { ...recolectar(), estado: 'borrador', actualizadoEn: new Date().toISOString() };
        return x;
      });
      toast({ variant: 'informative', title: 'Borrador guardado', message: 'Puedes retomar el registro SUID en cualquier momento.' });
    });

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const datos = recolectar();

      if (!datos.catastral || !datos.zona || !datos.lat || !datos.lng || !datos.direccion) {
        toast({ variant: 'negative', title: 'Pre-validación incompleta', message: 'Completa catastral, zona, lat/lng y dirección.' });
        return;
      }
      if (!validarRangoColombia()) {
        toast({ variant: 'negative', title: 'Coordenadas fuera de rango', message: 'Lat: −4.23 a 12.53 · Lng: −81.73 a −66.87 (Colombia).' });
        return;
      }
      if (!datos.tipoInfraGeneral || !datos.tipoEscenario || !datos.estadoConservacion) {
        toast({ variant: 'negative', title: 'Identificación incompleta', message: 'Selecciona tipo de infraestructura, escenario y estado de conservación.' });
        return;
      }
      if (datos.disciplinas.length === 0) {
        toast({ variant: 'negative', title: 'Sin disciplinas', message: 'Selecciona al menos 1 disciplina deportiva.' });
        return;
      }
      if (!datos.areaPredio || !datos.aforo) {
        toast({ variant: 'negative', title: 'Faltan medidas', message: 'Completa área del predio y aforo.' });
        return;
      }
      if (!datos.tipoAcceso) {
        toast({ variant: 'negative', title: 'Falta tipo de acceso', message: 'Selecciona el tipo de acceso al escenario.' });
        return;
      }

      ProjectData.setProyecto(p.idUnico, x => {
        x.registroSuid = { ...datos, estado: 'completo', registradoEn: new Date().toISOString() };
        x.historial = x.historial || [];
        x.historial.push({
          ts: new Date().toISOString(), actor: 'admin',
          evento: `Escenario inventariado en SUID · ${suidCode}`,
          estado: 'en_inversion'
        });
        return x;
      });
      toast({ variant: 'positive', title: '¡Escenario inventariado!', message: `${suidCode} se agregó al inventario nacional.` });
      setTimeout(() => { window.location.href = 'inversion.html'; }, 1400);
    });
  }
</script>
